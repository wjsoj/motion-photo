name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full validation (lint, type-check, test, build)
        run: bun run validate

      - name: Check for changeset (skip for version PRs)
        if: ${{ !contains(github.head_branch, 'changeset-release') }}
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "::warning::No changeset found. Please run 'bun changeset' to document your changes."
            echo "If this is a documentation-only change, you can ignore this warning."
          fi

      - name: PR Summary
        if: always()
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.head_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ github.base_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks:" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Build: OK" >> $GITHUB_STEP_SUMMARY
